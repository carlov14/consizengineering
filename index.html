<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConSize Engineering | Precision in every scale</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom Theme Colors mapped to Tailwind variables */
        :root {
            --color-grey-dark: #23272A;
            --color-grey-medium: #4A4E51;
            --color-grey-light: #F4F5F6;
            --color-yellow: #F6E05E;
            --color-yellow-hover: #ECC94B;
        }

        /* 3D Grid Overlay for Hero Background */
        .engineering-grid {
            background-image: 
                linear-gradient(rgba(246, 224, 94, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(246, 224, 94, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            transform: perspective(500px) rotateX(60deg);
            transform-origin: top;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }
    </style>
</head>
